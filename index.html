<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自律打卡</title>
    <style>
        :root {
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 16px;
            --radius-sm: 10px;
        }

        .theme-dark, [data-theme="dark"] {
            --bg: #09090f; --bg-secondary: #111118; --card: #15151f;
            --card-hover: #1c1c2a; --border: #222233; --border-glow: rgba(108,92,231,0.25);
            --text: #e8e8f0; --text-secondary: #a0a0b8; --text-muted: #6b6b85;
            --accent: #7c6ff7; --accent-2: #a78bfa;
            --accent-glow: rgba(124,111,247,0.3); --success: #00d2a0;
            --success-bg: rgba(0,210,160,0.1); --danger: #ff6b6b;
            --danger-bg: rgba(255,107,107,0.08); --danger-border: rgba(255,107,107,0.3);
            --warning: #ffa502; --shadow: 0 2px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5); --btn-disabled-bg: #222233;
            --btn-disabled-text: #555; --today-border: var(--accent);
            --future-text: #3a3a50; --calendar-checked-bg: rgba(0,210,160,0.12);
            --modal-overlay: rgba(0,0,0,0.7); --theme-toggle-bg: #222233;
            --sync-badge: #222233; --ring-track: rgba(255,255,255,0.06);
            --glass: rgba(21,21,31,0.85);
        }

        .theme-light, [data-theme="light"] {
            --bg: #f4f4f9; --bg-secondary: #eaeaef; --card: #ffffff;
            --card-hover: #f8f8fd; --border: #e0e0ec; --border-glow: rgba(91,76,219,0.15);
            --text: #1a1a30; --text-secondary: #555570; --text-muted: #999aac;
            --accent: #6c5ce7; --accent-2: #a29bfe;
            --accent-glow: rgba(108,92,231,0.2); --success: #00a87a;
            --success-bg: rgba(0,168,122,0.08); --danger: #e05555;
            --danger-bg: rgba(224,85,85,0.05); --danger-border: rgba(224,85,85,0.3);
            --warning: #e89500; --shadow: 0 2px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 6px 32px rgba(0,0,0,0.1); --btn-disabled-bg: #e8e8ee;
            --btn-disabled-text: #bbb; --today-border: var(--accent);
            --future-text: #d0d0dc; --calendar-checked-bg: rgba(0,168,122,0.1);
            --modal-overlay: rgba(0,0,0,0.35); --theme-toggle-bg: #e0e0e8;
            --sync-badge: #e8e8ee; --ring-track: rgba(0,0,0,0.04);
            --glass: rgba(255,255,255,0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
            position: relative;
        }

        /* ========== Animated Background ========== */
        .bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.5;
        }
        .theme-light .bg-canvas { opacity: 0.3; }

        .container {
            width: 100%; max-width: 800px; margin: 0 auto; padding: 24px 20px;
            display: flex; flex-direction: column; gap: 18px; position: relative; z-index: 1;
        }

        /* ========== Top Bar ========== */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 14px; padding: 12px 18px;
            box-shadow: var(--shadow); transition: all var(--transition);
        }
        .top-bar:hover { border-color: var(--border-glow); }
        .time-weather { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .time-block { display: flex; align-items: baseline; gap: 6px; }
        .time-main { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; color: var(--text); }
        .time-weekday { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .top-right { display: flex; align-items: center; gap: 10px; }
        .sync-badge {
            font-size: 11px; padding: 4px 12px; border-radius: 20px;
            background: var(--sync-badge); color: var(--text-muted);
            letter-spacing: 1px; cursor: pointer; border: 1px solid transparent;
            font-family: inherit; transition: all var(--transition);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        .sync-badge:hover { border-color: var(--border); color: var(--text-secondary); }
        .sync-badge.synced { color: var(--success); border-color: rgba(0,210,160,0.2); }
        .sync-badge.error { color: var(--danger); border-color: rgba(255,107,107,0.2); }
        .sync-badge .dot {
            display: inline-block; width: 5px; height: 5px; border-radius: 50%;
            margin-right: 4px; vertical-align: middle;
            background: var(--text-muted); transition: background var(--transition);
        }
        .sync-badge.synced .dot { background: var(--success); box-shadow: 0 0 6px rgba(0,210,160,0.5); }
        .sync-badge.error .dot { background: var(--danger); }
        .theme-selector { display: flex; background: var(--theme-toggle-bg); border-radius: 20px; padding: 3px; }
        .theme-selector button {
            width: 32px; height: 28px; border: none; border-radius: 18px;
            background: transparent; cursor: pointer; font-size: 13px; line-height: 1;
            color: var(--text-muted); transition: all var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .theme-selector button.active { background: var(--card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
        .theme-selector button:hover:not(.active) { color: var(--text-secondary); }

        /* ========== Header ========== */
        .header { text-align: center; padding: 10px 0 4px; }
        .header h1 {
            font-size: 28px; font-weight: 700; letter-spacing: 4px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 50%, #c4b5fd 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: gradientShift 4s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .header .subtitle {
            color: var(--text-muted); font-size: 13px; margin-top: 4px;
            letter-spacing: 2px; min-height: 20px;
            transition: opacity 0.45s, transform 0.45s;
        }
        .header .subtitle.fade { opacity: 0; transform: translateY(4px); }

        /* ========== Main Layout ========== */
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
        .left-col, .right-col { display: flex; flex-direction: column; gap: 18px; }

        /* ========== Counter Card ========== */
        .counter-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 40px 30px; text-align: center;
            position: relative; overflow: visible; transition: all var(--transition);
            box-shadow: var(--shadow);
        }
        .counter-card:hover { border-color: var(--border-glow); box-shadow: var(--shadow-lg), 0 0 40px var(--accent-glow); }
        .ring-container { position: relative; display: inline-block; }
        .ring-svg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-90deg);
            width: 150px; height: 150px; pointer-events: none;
        }
        .ring-bg {
            fill: none; stroke: var(--ring-track); stroke-width: 3;
        }
        .ring-fg {
            fill: none; stroke: var(--accent); stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 6px var(--accent-glow));
        }
        .streak-number {
            font-size: 88px; font-weight: 800; line-height: 1;
            color: var(--text); font-variant-numeric: tabular-nums;
            transition: var(--transition); position: relative; z-index: 1;
        }
        .streak-number.pulse { animation: numberPop 0.5s ease-out; }
        @keyframes numberPop {
            0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); }
        }
        .streak-label { color: var(--text-muted); font-size: 14px; margin-top: 6px; letter-spacing: 3px; }
        .streak-message { color: var(--success); font-size: 14px; margin-top: 14px; font-weight: 500; min-height: 22px; transition: var(--transition); }

        /* ========== Progress stages ========== */
        .progress-stages {
            display: flex; justify-content: space-between; margin-top: 20px; gap: 4px;
        }
        .stage-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--ring-track);
            transition: all 0.5s;
        }
        .stage-dot.reached { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

        /* ========== Buttons ========== */
        .btn-group { display: flex; gap: 12px; }
        .btn {
            flex: 1; padding: 15px 24px; border: none; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 1px;
            transition: all var(--transition); font-family: inherit; position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            background-size: 200% 200%; opacity: 0; transition: opacity 0.3s;
        }
        .btn:hover::after { opacity: 1; animation: shimmer 1.5s ease-in-out infinite; }
        @keyframes shimmer {
            0% { background-position: 200% 0%; } 100% { background-position: -200% 0%; }
        }
        .btn:active { transform: scale(0.97); }
        .btn-checkin {
            background: linear-gradient(135deg, var(--accent), #5a4bd1); color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-checkin:hover:not(:disabled) {
            box-shadow: 0 6px 30px rgba(108,92,231,0.45); transform: translateY(-2px);
        }
        .btn-checkin:disabled { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); box-shadow: none; cursor: not-allowed; transform: none; }
        .btn-checkin:disabled::after { display: none; }
        .btn-checkin.checked { background: linear-gradient(135deg, var(--success), #00b894); box-shadow: 0 4px 20px rgba(0,210,160,0.25); }
        .btn-checkin.checked:hover { box-shadow: 0 6px 26px rgba(0,210,160,0.4); }
        .btn-reset { background: transparent; color: var(--danger); border: 1px solid var(--danger-border); }
        .btn-reset:hover { background: var(--danger-bg); border-color: rgba(255,107,107,0.6); transform: translateY(-1px); }

        /* ========== Stats ========== */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px 12px; text-align: center;
            transition: all var(--transition); box-shadow: var(--shadow);
            position: relative; overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--border-glow); box-shadow: var(--shadow-lg); }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; transition: var(--transition); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; letter-spacing: 1px; }
        .stat-card.highlight { border-color: rgba(124,111,247,0.3); }
        .stat-card.highlight .stat-value { color: var(--accent); }
        .stat-card.highlight::after {
            content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 1px;
        }

        /* ========== Calendar ========== */
        .calendar-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
            transition: all var(--transition); box-shadow: var(--shadow);
        }
        .calendar-card:hover { border-color: var(--border-glow); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .calendar-title { font-size: 14px; font-weight: 600; letter-spacing: 1px; color: var(--text); }
        .calendar-nav { display: flex; gap: 6px; }
        .calendar-nav button {
            width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 8px;
            background: transparent; color: var(--text); cursor: pointer; font-size: 13px;
            transition: all var(--transition); display: flex; align-items: center; justify-content: center;
        }
        .calendar-nav button:hover { background: var(--card-hover); border-color: var(--accent); color: var(--accent); }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 12px; color: var(--text-secondary);
            transition: all 0.2s; max-width: 38px; justify-self: center;
            cursor: default; position: relative;
        }
        .day-cell.checked {
            background: var(--calendar-checked-bg); color: var(--success); font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(0,210,160,0.2);
        }
        .day-cell.checked::after {
            content: ''; position: absolute; inset: 0; border-radius: 8px;
            background: radial-gradient(circle, rgba(0,210,160,0.15) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s;
        }
        .day-cell.checked:hover::after { opacity: 1; }
        .day-cell.today { border: 1.5px solid var(--today-border); color: var(--text); font-weight: 600; }
        .day-cell.future { color: var(--future-text); }
        .day-cell:not(.future):not(.checked):hover { background: var(--card-hover); }

        /* ========== Quote card ========== */
        .quote-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px 24px; text-align: center;
            transition: all var(--transition); box-shadow: var(--shadow);
            position: relative; overflow: hidden;
        }
        .quote-card:hover { border-color: var(--border-glow); }
        .quote-card::before {
            content: '"'; position: absolute; top: -10px; left: 16px;
            font-size: 72px; color: var(--accent); opacity: 0.08; font-family: Georgia, serif;
            line-height: 1;
        }
        .quote-text {
            font-size: 14px; color: var(--text-secondary); line-height: 1.8;
            letter-spacing: 1px; transition: all 0.5s; min-height: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        .quote-text.fade { opacity: 0; transform: translateY(6px); }

        /* ========== Week card ========== */
        .week-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; transition: all var(--transition); box-shadow: var(--shadow); }
        .week-card:hover { border-color: var(--border-glow); }
        .week-card-title { font-size: 12px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
        .week-strip { display: flex; gap: 6px; justify-content: center; margin-bottom: 8px; }
        .week-strip .wday { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-muted); transition: all 0.25s; }
        .week-strip .wday.done { background: var(--success-bg); border-color: rgba(0,210,160,0.3); color: var(--success); font-weight: 600; }
        .week-strip .wday.today-w { border-color: var(--accent); color: var(--text); font-weight: 600; box-shadow: 0 0 8px var(--accent-glow); }
        .week-labels { display: flex; gap: 6px; justify-content: center; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
        .week-labels span { width: 32px; text-align: center; }

        /* ========== Decorative divider ========== */
        .divider { display: flex; align-items: center; gap: 10px; opacity: 0.4; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

        /* ========== Modal ========== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 32px 28px; text-align: center;
            max-width: 380px; width: 90%; box-shadow: var(--shadow-lg);
            animation: modalIn 0.3s ease-out;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal h3 { font-size: 17px; margin-bottom: 10px; letter-spacing: 1px; color: var(--text); }
        .modal p { color: var(--text-secondary); font-size: 14px; margin-bottom: 22px; line-height: 1.6; }
        .modal .btn-group { justify-content: center; }
        .modal .btn-cancel {
            background: transparent; border: 1px solid var(--border); color: var(--text);
            flex: none; padding: 10px 24px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 14px; transition: all var(--transition);
        }
        .modal .btn-cancel:hover { background: var(--card-hover); }
        .modal .btn-confirm {
            background: var(--danger); color: #fff; flex: none; padding: 10px 24px;
            border-radius: var(--radius-sm); cursor: pointer; border: none; font-size: 14px; transition: all var(--transition);
        }
        .modal input {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg-secondary); color: var(--text); font-size: 13px; font-family: inherit;
            margin-bottom: 16px; outline: none; transition: all var(--transition);
        }
        .modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .modal .hint { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; text-align: left; }
        .modal .hint a { color: var(--accent); text-decoration: none; }
        .modal .hint a:hover { text-decoration: underline; }

        /* Toast */
        .toast {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px 28px; font-size: 14px;
            color: var(--text); letter-spacing: 1px;
            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            z-index: 200; box-shadow: var(--shadow-lg); white-space: nowrap;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (min-width: 680px) {
            .main-grid { grid-template-columns: 1fr 1fr; }
            .streak-number { font-size: 84px; }
        }
        @media (min-width: 800px) {
            .container { padding: 32px 20px; }
            .streak-number { font-size: 100px; }
            .ring-svg { width: 170px; height: 170px; }
        }
        @media (max-width: 400px) {
            .streak-number { font-size: 68px; }
            .ring-svg { width: 130px; height: 130px; }
            .counter-card { padding: 30px 20px; }
            .container { gap: 12px; padding: 14px 10px; }
            .btn { padding: 13px 16px; font-size: 14px; }
            .stat-value { font-size: 22px; }
            .top-bar { padding: 10px 14px; gap: 8px; }
            .quote-card { padding: 16px; }
        }
    </style>
</head>
<body class="theme-dark">
    <!-- Background Animation -->
    <canvas class="bg-canvas" id="bgCanvas"></canvas>

    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="time-weather">
                <div class="time-block">
                    <span class="time-main" id="timeDisplay">--</span>
                    <span class="time-weekday" id="weekdayDisplay">--</span>
                </div>
            </div>
            <div class="top-right">
                <button class="sync-badge" id="syncBadge" onclick="showTokenModal()" title="设置 GitHub Token 跨设备同步"><span class="dot"></span>未同步</button>
                <div class="theme-selector">
                    <button id="themeAuto" onclick="setTheme('auto')" title="跟随系统">◐</button>
                    <button id="themeLight" onclick="setTheme('light')" title="浅色">☀</button>
                    <button id="themeDark" onclick="setTheme('dark')" title="深色">☽</button>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <h1>自 律 打 卡</h1>
            <div class="subtitle" id="subtitle">坚持每一天</div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <div class="left-col">
                <!-- Counter -->
                <div class="counter-card">
                    <div class="ring-container">
                        <svg class="ring-svg" viewBox="0 0 170 170">
                            <circle class="ring-bg" cx="85" cy="85" r="80"/>
                            <circle class="ring-fg" id="ringFg" cx="85" cy="85" r="80"
                                stroke-dasharray="502.65" stroke-dashoffset="502.65"/>
                        </svg>
                        <div class="streak-number" id="streakNumber">0</div>
                    </div>
                    <div class="streak-label">连续打卡天数</div>
                    <div class="streak-message" id="streakMessage"></div>
                    <div class="progress-stages">
                        <div class="stage-dot" data-at="3" title="3天"></div>
                        <div class="stage-dot" data-at="7" title="7天"></div>
                        <div class="stage-dot" data-at="14" title="14天"></div>
                        <div class="stage-dot" data-at="21" title="21天"></div>
                        <div class="stage-dot" data-at="30" title="30天"></div>
                        <div class="stage-dot" data-at="60" title="60天"></div>
                        <div class="stage-dot" data-at="90" title="90天"></div>
                        <div class="stage-dot" data-at="180" title="180天"></div>
                        <div class="stage-dot" data-at="365" title="365天"></div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="btn-group">

    <script>
        // ==================== Config ====================
        const OWNER = 'eyJjaG';
        const REPO = 'demo';
        const DATA_PATH = 'data.json';
        const STORAGE_KEY = 'disciplined_checkin_data';
        const THEME_KEY = 'disciplined_theme_pref';
        const TOKEN_KEY = 'disciplined_gh_token';

        // ==================== Animated Background ====================
        (function() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const maxParticles = 55;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const isDark = () => document.body.classList.contains('theme-dark');
            const isLight = () => document.body.classList.contains('theme-light');

            class Particle {
                constructor() { this.reset(true); }
                reset(init) {
                    this.x = Math.random() * canvas.width;
                    this.y = init ? Math.random() * canvas.height : canvas.height + 10;
                    this.size = Math.random() * 1.8 + 0.3;
                    this.speed = Math.random() * 0.4 + 0.15;
                    this.opacity = Math.random() * 0.35 + 0.05;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = (Math.random() - 0.5) * 0.008;
                }
                update() {
                    this.y -= this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * 0.3;
                    if (this.y < -10) this.reset(false);
                    if (this.x < -10) this.x = canvas.width + 10;
                    if (this.x > canvas.width + 10) this.x = -10;
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    if (isDark()) {
                        ctx.fillStyle = `rgba(124,111,247,${this.opacity})`;
                    } else {
                        ctx.fillStyle = `rgba(108,92,231,${this.opacity * 0.7})`;
                    }
                    ctx.fill();
                }
            }

            while (particles.length < maxParticles) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particles) { p.update(); p.draw(ctx); }

                // Draw connections between nearby particles
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 100) {
                            const alpha = (1 - dist / 100) * 0.06;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = isDark()
                                ? `rgba(124,111,247,${alpha})`
                                : `rgba(108,92,231,${alpha * 0.6})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ==================== GitHub Sync ====================
        function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

        function apiHeaders() {
            const token = getToken();
            return token
                ? { 'Accept': 'application/vnd.github.v3+json', 'Authorization': 'Bearer ' + token }
                : { 'Accept': 'application/vnd.github.v3+json' };
        }

        async function fetchRemoteData() {
            const token = getToken(); if (!token) return null;
            try {
                const resp = await fetch(
                    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DATA_PATH}`,
                    { headers: apiHeaders(), cache: 'no-store' }
                );
                if (resp.status === 404) return { _notFound: true };
                if (!resp.ok) {
                    const body = await resp.text();
                    throw new Error(`HTTP ${resp.status}: ${body.slice(0, 200)}`);
                }
                const j = await resp.json();
                const raw = atob(j.content.replace(/\s/g, ''));
                const obj = JSON.parse(raw);
                obj._sha = j.sha;
                return obj;
            } catch (e) { console.error('fetchRemoteData:', e); return null; }
        }

        function b64Encode(str) {
            const bytes = new TextEncoder().encode(str);
            let binary = ''; for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        async function pushRemoteData(dataObj) {
            const token = getToken(); if (!token) return { ok: false, error: 'no_token' };
            try {
                const body = { message: 'Update checkin data', content: b64Encode(JSON.stringify(dataObj, null, 2)) };
                if (dataObj._sha) body.sha = dataObj._sha;
                const resp = await fetch(
                    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DATA_PATH}`,
                    { method: 'PUT', headers: apiHeaders(), body: JSON.stringify(body) }
                );
                const respBody = await resp.json();
                if (!resp.ok) { console.error('pushRemoteData:', respBody); return { ok: false, error: respBody.message || `HTTP ${resp.status}`, status: resp.status }; }
                return { ok: true, sha: respBody.content ? respBody.content.sha : null };
            } catch (e) { console.error('pushRemoteData:', e); return { ok: false, error: e.message }; }
        }

        function prepareSyncPayload(localData) {
            return {
                checkins: localData.checkins || {},
                lastCheckinDate: localData.lastCheckinDate || null,
                currentStreak: localData.currentStreak || 0,
                bestStreak: localData.bestStreak || 0,
                totalDays: localData.totalDays || 0,
            };
        }

        function calcStreakFrom(checkins) {
            let streak = 0; const d = new Date();
            for (let i = 0; i < 3650; i++) {
                const check = new Date(d); check.setDate(check.getDate() - i);
                if (checkins[dateKey(check.getFullYear(), check.getMonth()+1, check.getDate())]) streak++; else break;
            }
            return streak;
        }

        function mergeData(existing, incoming) {
            const merged = {
                checkins: Object.assign({}, existing.checkins || {}, incoming.checkins || {}),
                lastCheckinDate: (existing.lastCheckinDate || '') > (incoming.lastCheckinDate || '') ? existing.lastCheckinDate : incoming.lastCheckinDate,
            };
            merged.totalDays = Object.keys(merged.checkins).length;
            merged.currentStreak = calcStreakFrom(merged.checkins);
            merged.bestStreak = Math.max(existing.bestStreak || 0, incoming.bestStreak || 0, merged.currentStreak);
            return merged;
        }

        function updateSyncBadge(status) {
            const el = document.getElementById('syncBadge');
            el.classList.remove('synced', 'error');
            if (status === 'synced') { el.innerHTML = '<span class="dot"></span>已同步'; el.classList.add('synced'); }
            else if (status === 'error') { el.innerHTML = '<span class="dot"></span>同步失败'; el.classList.add('error'); }
            else if (status === 'no_token') { el.innerHTML = '<span class="dot"></span>未同步'; }
            else { el.innerHTML = '<span class="dot"></span>同步中…'; }
        }

        // ==================== Local Data ====================
        function loadLocalData() {
            try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
            return { checkins: {}, currentStreak: 0, bestStreak: 0, totalDays: 0, lastCheckinDate: null };
        }
        function saveLocalData(obj) { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }

        let data = loadLocalData();
        let calendarYear = new Date().getFullYear();
        let calendarMonth = new Date().getMonth() + 1;

        async function syncOnLoad() {
            const token = getToken(); if (!token) { updateSyncBadge('no_token'); return; }
            const remote = await fetchRemoteData();
            if (!remote) { updateSyncBadge('error'); return; }
            if (remote._notFound) { updateSyncBadge('synced'); return; }
            // Remote is authoritative on load — replace local entirely
            delete remote._sha;
            data = remote;
            recalcStats();
            saveLocalData(data);
            updateUI();
            updateSyncBadge('synced');
        }

        async function syncAfterChange() {
            const token = getToken(); if (!token) { updateSyncBadge('no_token'); return; }
            let remote = await fetchRemoteData();
            if (!remote) { updateSyncBadge('error'); showToast('同步失败：无法连接 GitHub API'); return; }
            const payload = prepareSyncPayload(data);
            if (!remote._notFound) {
                const merged = mergeData(remote, payload); merged._sha = remote._sha;
                let result = await pushRemoteData(merged);
                if (result.ok) { updateSyncBadge('synced'); return; }
                if (result.status === 409) {
                    remote = await fetchRemoteData();
                    if (remote && !remote._notFound) {
                        const merged2 = mergeData(remote, payload); merged2._sha = remote._sha;
                        const retry = await pushRemoteData(merged2);
                        if (retry.ok) { updateSyncBadge('synced'); return; }
                    }
                }
                updateSyncBadge('error'); showToast('同步失败：' + (result.error || '请检查 Token 权限'));
            } else {
                const result = await pushRemoteData(payload);
                if (result.ok) { updateSyncBadge('synced'); }
                else { updateSyncBadge('error'); showToast('同步失败：' + (result.error || '请检查 Token 权限')); }
            }
        }

            if (mode === 'auto') {
                const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                body.classList.add(dark ? 'theme-dark' : 'theme-light');
                document.getElementById('themeAuto').classList.add('active');
            } else if (mode === 'light') {
                body.classList.add('theme-light'); document.getElementById('themeLight').classList.add('active');
            } else {
                body.classList.add('theme-dark'); document.getElementById('themeDark').classList.add('active');
            }
        }
        function setTheme(mode) { localStorage.setItem(THEME_KEY, mode); applyTheme(mode); }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if ((localStorage.getItem(THEME_KEY) || 'auto') === 'auto') applyTheme('auto');
        });
        applyTheme(localStorage.getItem(THEME_KEY) || 'auto');

        // ==================== Token Modal ====================
        function showTokenModal() { document.getElementById('tokenInput').value = getToken(); document.getElementById('tokenModal').classList.add('active'); }
        function hideTokenModal() { document.getElementById('tokenModal').classList.remove('active'); }
        function saveToken() {
            const val = document.getElementById('tokenInput').value.trim();
            if (!val || !val.startsWith('ghp_')) { showToast('Token 格式不正确，应以 ghp_ 开头'); return; }
            localStorage.setItem(TOKEN_KEY, val);
            hideTokenModal();
            showToast('Token 已保存，正在同步…');
            syncOnLoad().then(() => {
                const badge = document.getElementById('syncBadge');
                if (badge.classList.contains('synced')) showToast('✅ 同步成功！');
                else showToast('同步失败，请检查 Token 权限');
            });
        }

        // ==================== Checkin ====================
        function checkin() {
            const key = todayKey();
            if (data.checkins[key]) { showToast('今日已打卡，明天继续加油！'); return; }
            data.checkins[key] = true;
            data.lastCheckinDate = key;
            data.currentStreak = calcStreakFrom(data.checkins);
            data.totalDays = Object.keys(data.checkins).length;
            if (data.currentStreak > data.bestStreak) data.bestStreak = data.currentStreak;
            saveLocalData(data);
            updateUI();
            animateNumber();
            syncAfterChange();
            showToast('打卡成功！坚持就是胜利！');
        }

        async function resetAllData() {
            data = { checkins: {}, currentStreak: 0, bestStreak: 0, totalDays: 0, lastCheckinDate: null };
            saveLocalData(data);
            hideResetModal();
            updateUI();

            // Push empty data directly — don't merge with remote
            const token = getToken();
            if (token) {
                const remote = await fetchRemoteData();
                const payload = prepareSyncPayload(data);
                if (remote && !remote._notFound) payload._sha = remote._sha;
                const result = await pushRemoteData(payload);
                updateSyncBadge(result.ok ? 'synced' : 'error');
            } else {
                updateSyncBadge('no_token');
            }
            showToast('所有数据已清除');
        }
        function showResetModal() { document.getElementById('resetModal').classList.add('active'); }
        function hideResetModal() { document.getElementById('resetModal').classList.remove('active'); }
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg; toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
        }
        function animateNumber() {
            const el = document.getElementById('streakNumber');
            el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');
        }

        function getMotivationalMessage(streak) {
            if (streak === 0) return '从今天开始，迈出第一步吧';
            if (streak <= 3) return '万事开头难，你已经很棒了！';
            if (streak <= 7) return '一周是一个里程碑，继续坚持！';
            if (streak <= 14) return '两周了，自律正在成为习惯 💪';
            if (streak <= 21) return '21天养成一个习惯，你做到了！';
            if (streak <= 30) return '满月！你的意志力远超常人 🔥';
            if (streak <= 60) return '两个月，新的生活方式已经形成';
            if (streak <= 90) return '90天！这是真正的蜕变 ✨';
            if (streak <= 180) return '半年坚守，你已脱胎换骨 🌟';
            if (streak <= 365) return '一年之约，你是自己的英雄 🏆';
            return '传奇仍在继续，致敬强大的内心 👑';
        }

        function updateUI() {
            const streak = data.currentStreak || 0;
            const total = data.totalDays || 0;
            const best = data.bestStreak || 0;
            document.getElementById('streakNumber').textContent = streak;
            document.getElementById('streakMessage').textContent = getMotivationalMessage(streak);
            document.getElementById('currentStreak').textContent = streak;
            document.getElementById('totalDays').textContent = total;
            document.getElementById('bestStreak').textContent = best;

            // Ring progress: max=365 for full circle
            const circumference = 502.65;
            const progress = Math.min(streak / 365, 1);
            const offset = circumference * (1 - progress);
            document.getElementById('ringFg').style.strokeDashoffset = offset;

            // Stage dots: milestones at 3,7,14,21,30,60,90,180,365
            document.querySelectorAll('.stage-dot').forEach(dot => {
                const at = parseInt(dot.dataset.at);
                dot.classList.toggle('reached', streak >= at);
            });

            const key = todayKey();
            const btn = document.getElementById('btnCheckin');
            if (data.checkins[key]) {
                btn.textContent = '✓ 今日已打卡'; btn.classList.add('checked'); btn.disabled = true;
            } else {
                btn.textContent = '今日打卡'; btn.classList.remove('checked'); btn.disabled = false;
            }
            renderCalendar();
            renderWeekStrip();
        }

        // ==================== Calendar ====================
        function renderCalendar() {
            const y = calendarYear, m = calendarMonth;
            document.getElementById('calendarTitle').textContent = `${y} 年 ${m} 月`;
            const firstDay = new Date(y, m-1, 1).getDay();
            const daysInMonth = new Date(y, m, 0).getDate();
            const today = new Date(), todayK = todayKey();
            const grid = document.getElementById('daysGrid');
            let html = '';
            for (let i = 0; i < firstDay; i++) html += '<div class="day-cell"></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const key = dateKey(y, m, d);
                const isChecked = data.checkins[key];
                const isToday = key === todayK;
                const isFuture = new Date(y, m-1, d) > today;
                let cls = 'day-cell';
                if (isChecked) cls += ' checked';
                if (isToday) cls += ' today';
                if (isFuture && !isChecked) cls += ' future';
                html += `<div class="${cls}">${d}</div>`;
            }
            grid.innerHTML = html;
        }
        function prevMonth() { calendarMonth--; if (calendarMonth < 1) { calendarMonth = 12; calendarYear--; } renderCalendar(); }
        function nextMonth() { calendarMonth++; if (calendarMonth > 12) { calendarMonth = 1; calendarYear++; } renderCalendar(); }

        function renderWeekStrip() {
            const now = new Date();
            const bj = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
            const dayOfWeek = bj.getDay(); // 0=Sun
            // Monday of current week
            const monday = new Date(bj);
            monday.setDate(bj.getDate() - ((dayOfWeek + 6) % 7));
            const strip = document.getElementById('weekStrip');
            let html = '';
            const labels = ['一','二','三','四','五','六','日'];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                const key = dateKey(d.getFullYear(), d.getMonth() + 1, d.getDate());
                const done = data.checkins[key];
                const isToday = key === todayKey();
                // Use dd as label
                const dd = d.getDate();
                let cls = 'wday';
                if (done) cls += ' done';
                if (isToday) cls += ' today-w';
                html += `<div class="${cls}">${dd}</div>`;
            }
            strip.innerHTML = html;
        }

        document.getElementById('resetModal').addEventListener('click', function(e) { if (e.target === this) hideResetModal(); });
        document.getElementById('tokenModal').addEventListener('click', function(e) { if (e.target === this) hideTokenModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { hideResetModal(); hideTokenModal(); } });

        // Init — always recalc streak from actual data on load
        function recalcStats() {
            data.currentStreak = calcStreakFrom(data.checkins);
            data.totalDays = Object.keys(data.checkins).length;
            if (data.currentStreak > data.bestStreak) data.bestStreak = data.currentStreak;
        }
        recalcStats();
        syncOnLoad().then(() => { recalcStats(); updateUI(); });
        if (!getToken()) updateUI();
    </script>
</body>
</html>
